services:
  # ── Backend API (Docker — required for Chromium/Puppeteer) ────────────────
  - type: web
    name: anistream-api
    env: docker
    dockerfilePath: ./server/Dockerfile
    dockerContext: ./server
    region: oregon
    plan: free
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8080
      - key: CORS_ORIGIN
        value: "*"
      # Optional — enriches hero section banners/synopsis:
      # - key: MAL_CLIENT_ID
      #   value: your_mal_client_id_here

  # ── Frontend (Static site) ─────────────────────────────────────────────────
  - type: static_site
    name: anistream-frontend
    buildCommand: npm install && npm run build
    publishPath: ./dist
    region: oregon
    envVars:
      - key: NODE_ENV
        value: production
      # After the API service is first deployed, copy its URL here:
      # e.g. https://anistream-api.onrender.com
      - key: VITE_API_URL
        value: https://anifoxwatch-w2xk.onrender.com
