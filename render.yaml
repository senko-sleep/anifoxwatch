# Use Docker for the API (not Native Node). Chromium is installed for Puppeteer/9Anime.
# Build context must be repo root (.) so server/patches copies work — even if Dockerfile path is ./server/Dockerfile.
# Free tier "spins down" — first request may take ~50s+ (RENDER-DEPLOY.txt).

services:
  # ── Backend API (Docker — Chromium for Puppeteer) ─────────────────────────
  - type: web
    name: anifoxwatch
    env: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    region: oregon
    plan: free
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8080
      - key: CORS_ORIGIN
        value: "*"
      # Optional — enriches hero section banners/synopsis:
      # - key: MAL_CLIENT_ID
      #   value: your_mal_client_id_here

  # ── Frontend (Static site) ─────────────────────────────────────────────────
  - type: static_site
    name: anistream-frontend
    buildCommand: npm install && npm run build
    publishPath: ./dist
    region: oregon
    envVars:
      - key: NODE_ENV
        value: production
      # After the API service is first deployed, copy its URL here:
      # Must match the Docker web service URL above (same host as API).
      - key: VITE_API_URL
        value: https://anifoxwatch-sm7s.onrender.com
