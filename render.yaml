# Use Docker for the API (not Native Node). Chromium is installed for Puppeteer/9Anime.
# Build context must be repo root (.) so server/patches copies work — even if Dockerfile path is ./server/Dockerfile.
# Free tier keep-alive: the cron job below pings /health every 14 min to prevent spin-down.

services:
  # ── Backend API (Docker — Chromium for Puppeteer) ─────────────────────────
  - type: web
    name: anifoxwatch
    env: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    region: oregon
    plan: free
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8080
      # Canonical public URL (matches Render dashboard URL; used if RENDER_EXTERNAL_URL is unset)
      - key: BASE_URL
        value: https://anifoxwatch-ci33.onrender.com
      - key: CORS_ORIGIN
        value: "*"
      # HiAnime REST API (deploy server/aniwatch-api/ to Railway, paste URL here)
      - key: HIANIME_REST_URL
        value: ""
      # CF Worker fallback proxy for CDN segments blocked from Render's IP
      - key: DEFAULT_REMOTE_STREAM_PROXY
        value: https://anifoxwatch-api.anya-bot.workers.dev/api/stream/proxy
      # Optional — enriches hero section banners/synopsis:
      # - key: MAL_CLIENT_ID
      #   value: your_mal_client_id_here

  # ── Keep-alive cron (prevents free-tier spin-down) ────────────────────────
  - type: cron
    name: anifoxwatch-keepalive
    schedule: "*/14 * * * *"
    command: curl -fsS https://anifoxwatch-ci33.onrender.com/health
    region: oregon
    plan: free

  # ── Frontend (Static site) ─────────────────────────────────────────────────
  - type: static_site
    name: anistream-frontend
    buildCommand: npm install && npm run build
    publishPath: ./dist
    region: oregon
    envVars:
      - key: NODE_ENV
        value: production
      # Primary API: Cloudflare Workers (no cold starts, global edge).
      # Render backend is used as fallback for Puppeteer-dependent routes.
      - key: VITE_API_URL
        value: https://anifoxwatch-api.anya-bot.workers.dev
