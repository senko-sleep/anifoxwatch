# =============================================================================
# ANISTREAM HUB – Cloudflare Workers Configuration
# =============================================================================
# Deploy:   npx wrangler deploy --env production
# Dev:      npx wrangler dev --env development
# Secrets:  npx wrangler secret put SECRET_NAME --env production
# =============================================================================

name = "anifoxwatch-api"

# Production-safe entry: edge-compatible.
main = "src/worker.ts"

compatibility_date = "2026-05-26"

# Enables Node.js built-ins polyfilled by Cloudflare (stream, buffer, crypto…)
compatibility_flags = ["nodejs_compat"]

# ============================================================================
# BUILD
# ============================================================================
[build]
command = "npm run build:worker"

# ============================================================================
# OBSERVABILITY  (Workers Analytics Engine → Cloudflare Dashboard)
# ============================================================================
[observability]
enabled = true

# ============================================================================
# PERFORMANCE LIMITS
# ============================================================================
# [limits]
# cpu_ms = 100

# ============================================================================
# PUBLIC ENVIRONMENT VARIABLES  (non-sensitive; safe to commit)
# ============================================================================
[vars]
NODE_ENV            = "production"
LOG_LEVEL           = "info"
API_VERSION         = "1.0.0"
WORKER_NAME         = "anifoxwatch-api"

# External API base URLs
ANILIST_API_URL     = "https://graphql.anilist.co"
JIKAN_API_URL       = "https://api.jikan.moe/v4"
HIANIME_REST_URL    = "https://aniwatch-api-coral-seven.vercel.app"

# Timeout thresholds (milliseconds)
GLOBAL_TIMEOUT_MS       = "15000"
API_CALL_TIMEOUT_MS     = "8000"
FETCH_RETRY_COUNT       = "3"
FETCH_RETRY_DELAY_MS    = "300"

# Feature flags
ENABLE_KV_CACHING       = "true"
ENABLE_REQUEST_LOGGING  = "true"

# Cache TTLs (seconds)
CACHE_TTL_SEARCH        = "300"    # 5 min
CACHE_TTL_TRENDING      = "120"    # 2 min
CACHE_TTL_SEASONAL      = "600"    # 10 min
CACHE_TTL_ANIME_DETAIL  = "3600"   # 1 hour

# ============================================================================
# KV NAMESPACES  (Distributed Edge Cache)
# ============================================================================
# Create via:  npx wrangler kv:namespace create "CACHE_STORE"
# Then paste the returned `id` below.
[[kv_namespaces]]
binding    = "CACHE_STORE"
id         = "f556172416494852a4ceadcc3c2776bf"
preview_id = "REPLACE_WITH_PREVIEW_KV_ID"

# ============================================================================
# SECRETS  (set via CLI – never committed)
# ============================================================================
# wrangler secret put ANILIST_CLIENT_SECRET --env production
# wrangler secret put INTERNAL_API_KEY --env production
#
# In Worker code these appear as: env.ANILIST_CLIENT_SECRET, env.INTERNAL_API_KEY

# ============================================================================
# DEPLOYMENT TARGET (workers.dev subdomain, active for all envs)
# ============================================================================
workers_dev = true

# ============================================================================
# PRODUCTION ENVIRONMENT
# ============================================================================
[env.production]
name = "anifoxwatch-api-prod"
workers_dev = false

# Uncomment and fill in once you have a custom domain zone:
# routes = [
#   { pattern = "api.anifoxwatch.com/*", zone_name = "anifoxwatch.com" }
# ]

[env.production.vars]
NODE_ENV              = "production"
LOG_LEVEL             = "warn"
ENABLE_KV_CACHING     = "true"
ENABLE_REQUEST_LOGGING = "false"
ANILIST_API_URL       = "https://graphql.anilist.co"
JIKAN_API_URL         = "https://api.jikan.moe/v4"
HIANIME_REST_URL      = "https://aniwatch-api-coral-seven.vercel.app"

[[env.production.kv_namespaces]]
binding    = "CACHE_STORE"
id         = "f556172416494852a4ceadcc3c2776bf"

# ============================================================================
# STAGING ENVIRONMENT
# ============================================================================
[env.staging]
name = "anifoxwatch-api-staging"
workers_dev = true

[env.staging.vars]
NODE_ENV              = "staging"
LOG_LEVEL             = "info"
ENABLE_KV_CACHING     = "true"
ENABLE_REQUEST_LOGGING = "true"
ANILIST_API_URL       = "https://graphql.anilist.co"
JIKAN_API_URL         = "https://api.jikan.moe/v4"
HIANIME_REST_URL      = "https://aniwatch-api-coral-seven.vercel.app"

[[env.staging.kv_namespaces]]
binding    = "CACHE_STORE"
id         = "REPLACE_WITH_STAGING_KV_ID"

# ============================================================================
# DEVELOPMENT ENVIRONMENT
# ============================================================================
[env.development]
name = "anifoxwatch-api-dev"
workers_dev = true

[env.development.vars]
NODE_ENV              = "development"
LOG_LEVEL             = "debug"
ENABLE_KV_CACHING     = "false"   # Uses in-memory fallback locally
ENABLE_REQUEST_LOGGING = "true"
GLOBAL_TIMEOUT_MS     = "30000"   # Looser timeout during dev
ANILIST_API_URL       = "https://graphql.anilist.co"
JIKAN_API_URL         = "https://api.jikan.moe/v4"
HIANIME_REST_URL      = "https://aniwatch-api-coral-seven.vercel.app"
