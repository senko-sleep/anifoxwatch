name = "anifoxwatch-api"
# Choose your worker implementation:
# - src/worker.ts = Standard (all routes inline, 700+ lines)
# - src/worker-modular.ts = Modular (separate route files, maintainable) ✅ Recommended
main = "dist/worker-modular.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Deploy to workers.dev subdomain
workers_dev = true

[vars]
NODE_ENV = "production"
# Optional: full Node API for Puppeteer-heavy streaming only (set in dashboard if you self-host Express elsewhere).
# Optional: HiAnime via HTTP (e.g. aniwatch-api on Vercel). Worker calls this from the edge; browser still uses VITE_API_URL → Worker.
HIANIME_REST_URL = "https://aniwatch-api-coral-seven.vercel.app"

# Build configuration - build TypeScript to dist before deploying
outdir = "dist"

# Use serverless-http/express adapter behavior
[observability]
enabled = true
