<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Player Speed Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        .test-result {
            margin: 10px 0;
            padding: 10px;
            border-radius: 5px;
        }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .loading { background: #fff3cd; color: #856404; }
        video {
            width: 100%;
            max-width: 600px;
            margin: 20px 0;
        }
        button {
            padding: 10px 20px;
            margin: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>Video Player Speed Test</h1>
    <p>Testing frontend playback performance with optimized HLS.js settings</p>
    
    <div>
        <button onclick="testPlayback('anilist-21')">Test One Piece (anilist-21)</button>
        <button onclick="testPlayback('anilist-20')">Test Naruto (anilist-20)</button>
        <button onclick="testPlayback('anilist-101922')">Test Demon Slayer (anilist-101922)</button>
    </div>
    
    <div id="results"></div>
    <video id="video" controls></video>
    
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.7/dist/hls.min.js"></script>
    <script>
        const API_BASE = 'http://localhost:3001';
        const resultsDiv = document.getElementById('results');
        const video = document.getElementById('video');
        let hlsInstance = null;
        
        function addResult(message, type = 'loading') {
            const div = document.createElement('div');
            div.className = `test-result ${type}`;
            div.textContent = message;
            resultsDiv.appendChild(div);
            return div;
        }
        
        async function testPlayback(episodeId) {
            resultsDiv.innerHTML = '';
            const startTime = performance.now();
            const resultDiv = addResult(`Testing: ${episodeId}...`, 'loading');
            
            // Clean up previous HLS instance
            if (hlsInstance) {
                try {
                    hlsInstance.destroy();
                } catch (e) {
                    console.error('Error destroying previous HLS instance:', e);
                }
                hlsInstance = null;
            }
            
            try {
                // Step 1: Fetch stream URL
                const fetchStart = performance.now();
                const response = await fetch(`${API_BASE}/api/stream/watch/${encodeURIComponent(episodeId)}?category=sub`);
                const fetchEnd = performance.now();
                const fetchTime = fetchEnd - fetchStart;
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                
                const data = await response.json();
                console.log(`✓ Stream fetch: ${fetchTime.toFixed(0)}ms`);
                addResult(`✓ Stream fetch: ${fetchTime.toFixed(0)}ms`, 'success');
                
                if (!data.sources || data.sources.length === 0) {
                    throw new Error('No sources found');
                }
                
                const streamUrl = data.sources[0].url;
                console.log(`✓ Got stream URL: ${streamUrl.substring(0, 50)}...`);
                addResult(`✓ Got stream URL: ${streamUrl.substring(0, 50)}...`, 'success');
                
                // Step 2: Initialize HLS
                const hlsStart = performance.now();
                
                if (Hls.isSupported()) {
                    hlsInstance = new Hls({
                        enableWorker: true,
                        lowLatencyMode: false,
                        backBufferLength: 10,
                        maxBufferLength: 30,
                        maxMaxBufferLength: 60,
                        maxBufferHole: 3.0,
                        startLevel: 0,
                        abrEwmaDefaultEstimate: 1500000,
                        fragLoadingTimeOut: 8000,
                        manifestLoadingTimeOut: 10000,
                        levelLoadingTimeOut: 10000,
                    });
                    
                    let manifestParsed = false;
                    let firstFragmentLoaded = false;
                    
                    hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => {
                        const manifestTime = performance.now() - hlsStart;
                        console.log(`Manifest parsed: ${manifestTime.toFixed(0)}ms`);
                        addResult(`✓ Manifest parsed: ${manifestTime.toFixed(0)}ms`, 'success');
                        manifestParsed = true;
                        video.play().catch(e => console.error('Autoplay error:', e));
                    });
                    
                    hlsInstance.on(Hls.Events.FRAG_LOADED, (event, data) => {
                        console.log('Fragment loaded:', data);
                        if (!firstFragmentLoaded) {
                            const fragTime = performance.now() - hlsStart;
                            console.log(`First fragment loaded: ${fragTime.toFixed(0)}ms`);
                            addResult(`✓ First fragment loaded: ${fragTime.toFixed(0)}ms`, 'success');
                            firstFragmentLoaded = true;
                            
                            const totalTime = performance.now() - startTime;
                            const status = totalTime < 12000 ? 'success' : 'error';
                            resultDiv.className = `test-result ${status}`;
                            resultDiv.textContent = `✓ Total time: ${totalTime.toFixed(0)}ms (${(totalTime/1000).toFixed(2)}s) - ${totalTime < 12000 ? 'PASS' : 'FAIL'}`;
                        }
                    });
                    
                    hlsInstance.on(Hls.Events.ERROR, (event, data) => {
                        console.error('HLS Error:', data);
                        if (data.fatal) {
                            addResult(`✗ HLS Error: ${data.type} - ${data.details}`, 'error');
                            // Try to recover
                            if (data.type === Hls.ErrorTypes.NETWORK_ERROR) {
                                hlsInstance.startLoad();
                            } else if (data.type === Hls.ErrorTypes.MEDIA_ERROR) {
                                hlsInstance.recoverMediaError();
                            }
                        }
                    });
                    
                    hlsInstance.loadSource(streamUrl);
                    hlsInstance.attachMedia(video);
                    
                } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                    video.src = streamUrl;
                    video.addEventListener('loadedmetadata', () => {
                        const manifestTime = performance.now() - hlsStart;
                        addResult(`✓ Native HLS loaded: ${manifestTime.toFixed(0)}ms`, 'success');
                        video.play();
                    });
                } else {
                    throw new Error('HLS not supported');
                }
                
            } catch (error) {
                const totalTime = performance.now() - startTime;
                addResult(`✗ Error: ${error.message} (${totalTime.toFixed(0)}ms)`, 'error');
            }
        }
        
        // Expose function globally for Puppeteer
        window.testPlayback = testPlayback;
    </script>
</body>
</html>
